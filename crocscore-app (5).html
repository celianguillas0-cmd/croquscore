/* CrocScore — Design tokens (light + dark) */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  /* ─── Light theme (default) ──────────────────────────────────── */
  --cs-green-dark: #1a3a0f;
  --cs-green-mid: #2d6016;
  --cs-green-bright: #4a9422;
  --cs-green-light: #a8d878;
  --cs-green-pale: #e8f5d8;
  --cs-cream: #faf8f2;
  --cs-cream-dark: #f0ece0;
  --cs-white: #ffffff;
  --cs-text: #1a1a18;
  --cs-text-muted: #6b6b5e;
  --cs-text-light: #9b9b8e;

  /* Aliases sémantiques (utilisés par les composants) */
  --cs-bg: var(--cs-cream);
  --cs-bg-deep: #f3eee2;
  --cs-surface: var(--cs-white);
  --cs-surface-2: var(--cs-cream-dark);
  --cs-ink: var(--cs-text);
  --cs-ink-2: #2a2a25;
  --cs-muted: var(--cs-text-muted);
  --cs-faint: var(--cs-text-light);
  --cs-border: rgba(26, 58, 15, 0.10);
  --cs-border-strong: rgba(26, 58, 15, 0.18);
  --cs-accent: var(--cs-green-bright);
  --cs-accent-ink: var(--cs-green-dark);
  --cs-accent-tint: var(--cs-green-pale);
  --cs-accent-tint-2: #d4ecb8;
  --cs-shadow-rgb: 26, 58, 15;

  /* Score A→E — couleurs exactes du site */
  --cs-grade-a-bg: #e8f5d8; --cs-grade-a-fg: #1a3a0f;
  --cs-grade-b-bg: #d4f0a0; --cs-grade-b-fg: #2d6016;
  --cs-grade-c-bg: #fdedc0; --cs-grade-c-fg: #8b5e0a;
  --cs-grade-d-bg: #fdd8b0; --cs-grade-d-fg: #8b3a0a;
  --cs-grade-e-bg: #f8c8c8; --cs-grade-e-fg: #b43020;

  /* Type */
  --cs-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --cs-serif: 'Fraunces', 'Times New Roman', serif;
  --cs-mono: ui-monospace, 'SF Mono', Menlo, monospace;

  --cs-r-sm: 8px; --cs-r-md: 12px; --cs-r-lg: 16px; --cs-r-xl: 20px;

  /* Gradient signature */
  --cs-grad: linear-gradient(135deg, #4a9422 0%, #2d6016 100%);
  --cs-grad-hover: linear-gradient(135deg, #5aaa2e 0%, #3a7020 100%);

  /* Color scheme hint to the browser */
  color-scheme: light;
}

/* ─── Dark theme ────────────────────────────────────────────────── */
[data-theme="dark"] {
  --cs-green-dark: #c8e8a8;       /* used as primary green text */
  --cs-green-mid: #a8d878;
  --cs-green-bright: #8fc868;
  --cs-green-light: #b8e088;
  --cs-green-pale: rgba(168, 216, 120, 0.14);
  --cs-cream: #15140f;
  --cs-cream-dark: #1f1d17;
  --cs-white: #1c1a14;
  --cs-text: #f0ece0;
  --cs-text-muted: #9d9888;
  --cs-text-light: #6b6859;

  --cs-bg: #15140f;
  --cs-bg-deep: #0e0d09;
  --cs-surface: #1f1d17;
  --cs-surface-2: #2a2620;
  --cs-ink: #f0ece0;
  --cs-ink-2: #d8d4c5;
  --cs-muted: #9d9888;
  --cs-faint: #6b6859;
  --cs-border: rgba(232, 226, 216, 0.08);
  --cs-border-strong: rgba(232, 226, 216, 0.16);
  --cs-accent: #a8d878;
  --cs-accent-ink: #c8e8a8;
  --cs-accent-tint: rgba(168, 216, 120, 0.14);
  --cs-accent-tint-2: rgba(168, 216, 120, 0.22);
  --cs-shadow-rgb: 0, 0, 0;

  /* Grade colors stay vibrant but with darker backgrounds */
  --cs-grade-a-bg: #2a4818; --cs-grade-a-fg: #c8e8a8;
  --cs-grade-b-bg: #324a18; --cs-grade-b-fg: #b4dc78;
  --cs-grade-c-bg: #4a3d10; --cs-grade-c-fg: #f0c860;
  --cs-grade-d-bg: #4a2a10; --cs-grade-d-fg: #f0a060;
  --cs-grade-e-bg: #4a1c14; --cs-grade-e-fg: #f08070;

  color-scheme: dark;
}

.cs-root {
  font-family: var(--cs-sans);
  color: var(--cs-ink);
  background: var(--cs-bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.6;
  transition: background-color 0.4s ease, color 0.3s ease;
}

.cs-serif { font-family: var(--cs-serif); font-weight: 500; letter-spacing: -0.02em; }
.cs-mono { font-family: var(--cs-mono); font-feature-settings: "tnum", "zero"; }

/* Placeholder pour images manquantes */
.cs-placeholder {
  background-color: var(--cs-cream-dark);
  background-image: repeating-linear-gradient(
    135deg,
    rgba(var(--cs-shadow-rgb), 0.08) 0 1px,
    transparent 1px 8px
  );
  color: var(--cs-text-light);
  font-family: var(--cs-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}

button { font-family: inherit; }
.cs-root *::selection { background: var(--cs-green-bright); color: var(--cs-cream); }

  <style data-src="prototype.css">
/* CrocScore — Prototype interactif (animations + interactions) */

/* ─── Base & device frame ───────────────────────────────────────── */
html, body {
  margin: 0; padding: 0; min-height: 100%;
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(74,148,34,0.15) 0%, transparent 60%),
    radial-gradient(900px 700px at -10% 100%, rgba(168,216,120,0.18) 0%, transparent 55%),
    var(--cs-cream);
  font-family: var(--cs-sans);
  color: var(--cs-text);
  overflow-x: hidden;
  transition: background-color 0.4s ease;
}
[data-theme="dark"] body, body[data-theme="dark"] {
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(168,216,120,0.07) 0%, transparent 60%),
    radial-gradient(900px 700px at -10% 100%, rgba(74,148,34,0.1) 0%, transparent 55%),
    #0a0908;
}

.cs-stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

/* Phone frame visible only on desktop */
.cs-phone {
  position: relative;
  width: 100%;
  max-width: 440px;
  height: min(920px, 100vh);
  background: var(--cs-cream);
  border-radius: 48px;
  overflow: hidden;
  box-shadow:
    0 30px 80px -10px rgba(var(--cs-shadow-rgb), 0.35),
    0 8px 24px rgba(var(--cs-shadow-rgb), 0.12),
    0 0 0 12px #1a1812,
    0 0 0 13px rgba(168, 216, 120, 0.15);
  isolation: isolate;
  display: flex;
  flex-direction: column;
  transition: background-color 0.4s ease;
}

/* Host for absolutely-positioned screens so the tab bar can sit below them */
.cs-screen-host {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

/* Mobile: no frame, edge-to-edge */
@media (max-width: 540px) {
  body { background: var(--cs-cream); }
  [data-theme="dark"] body, body[data-theme="dark"] { background: #0a0908; }
  .cs-stage { padding: 0; min-height: 100dvh; height: 100dvh; }
  .cs-phone {
    max-width: 100%;
    width: 100%;
    height: 100dvh;
    border-radius: 0;
    box-shadow: none;
  }
}

/* Tablet : phone frame with notch (look coque iPhone) */
@media (min-width: 541px) and (max-width: 899px) {
  .cs-phone::before {
    content: '';
    position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 30px;
    background: #1a1812;
    border-radius: 22px;
    z-index: 100;
  }
}

/* Desktop (>=900px) : plein écran, pas de coque */
@media (min-width: 900px) {
  body { background: var(--cs-cream); }
  [data-theme="dark"] body, body[data-theme="dark"] { background: #0a0908; }
  .cs-stage { padding: 0; min-height: 100vh; height: 100vh; align-items: stretch; }
  .cs-phone {
    max-width: 100%;
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
  .cs-phone::before { display: none; }
  /* Contenu centré pour la lisibilité (mais le tab bar reste pleine largeur) */
  .cs-screen-scroll { max-width: 760px; margin: 0 auto; width: 100%; }
  .cs-screen { background: var(--cs-bg); }
}

/* ─── Screen / page system ──────────────────────────────────────── */
.cs-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--cs-cream);
}

.cs-screen-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.cs-screen-scroll::-webkit-scrollbar { display: none; }

.cs-status-pad { height: env(safe-area-inset-top, 50px); min-height: 50px; }

/* Page transitions */
.cs-screen.enter-right { animation: enterRight .42s cubic-bezier(.22,.9,.3,1) both; }
.cs-screen.enter-left { animation: enterLeft .42s cubic-bezier(.22,.9,.3,1) both; }
.cs-screen.enter-fade { animation: enterFade .35s ease-out both; }
.cs-screen.exit-left { animation: exitLeft .35s cubic-bezier(.4,0,.7,.2) both; }
.cs-screen.exit-right { animation: exitRight .35s cubic-bezier(.4,0,.7,.2) both; }
.cs-screen.exit-fade { animation: exitFade .25s ease-in both; }

@keyframes enterRight { from { transform: translateX(100%); opacity: 0.6; } to { transform: none; opacity: 1; } }
@keyframes enterLeft { from { transform: translateX(-100%); opacity: 0.6; } to { transform: none; opacity: 1; } }
@keyframes enterFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: none; } }
@keyframes exitLeft { from { transform: none; opacity: 1; } to { transform: translateX(-30%); opacity: 0.4; } }
@keyframes exitRight { from { transform: none; opacity: 1; } to { transform: translateX(30%); opacity: 0.4; } }
@keyframes exitFade { from { opacity: 1; } to { opacity: 0; } }

/* ─── Entrance animations ───────────────────────────────────────── */
.cs-fade-up { animation: fadeUp .6s cubic-bezier(.22,.9,.3,1) both; }
.cs-fade-in { animation: fadeIn .5s ease-out both; }
.cs-pop-in { animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
.cs-slide-up { animation: slideUp .5s cubic-bezier(.22,.9,.3,1) both; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: none; } }

/* Stagger helpers */
.cs-stagger > * { animation-delay: calc(var(--i, 0) * 60ms + 80ms); }

/* ─── Score reveal animation ────────────────────────────────────── */
@keyframes ringFill {
  from { stroke-dashoffset: var(--ring-c); }
  to { stroke-dashoffset: var(--ring-target); }
}
@keyframes letterPop {
  0% { transform: scale(0.4); opacity: 0; }
  60% { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes bar-fill {
  from { width: 0; }
  to { width: var(--bar-w); }
}
@keyframes count-up { from { opacity: 0; } to { opacity: 1; } }

.cs-score-reveal .cs-ring-fg {
  animation: ringFill 1.2s cubic-bezier(.22,.9,.3,1) .15s both;
}
.cs-score-reveal .cs-grade-letter {
  animation: letterPop .8s cubic-bezier(.34,1.56,.64,1) .8s both;
}
.cs-score-reveal .cs-score-num {
  animation: count-up .6s ease-out 1.1s both;
}
.cs-bar > i {
  animation: bar-fill 1s cubic-bezier(.22,.9,.3,1) both;
}

/* ─── Scan animation ────────────────────────────────────────────── */
@keyframes scanLaser {
  0% { transform: translateY(-90px); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(90px); opacity: 0; }
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(168, 216, 120, 0.5); }
  50% { box-shadow: 0 0 0 18px rgba(168, 216, 120, 0); }
}
.cs-laser { animation: scanLaser 1.6s ease-in-out infinite; }
.cs-pulse { animation: pulse-glow 2s ease-out infinite; }

@keyframes corner-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}
.cs-reticle-corner { animation: corner-pulse 1.6s ease-in-out infinite; }

/* Scan success burst */
@keyframes success-burst {
  0% { transform: scale(0); opacity: 0; }
  40% { transform: scale(1.4); opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}
.cs-success-burst {
  position: absolute; inset: 50% 50%; width: 80px; height: 80px;
  margin: -40px 0 0 -40px;
  border: 3px solid var(--cs-green-light);
  border-radius: 50%;
  animation: success-burst .9s ease-out both;
}

/* ─── Pressable elements ────────────────────────────────────────── */
.cs-press {
  transition: transform .18s ease, box-shadow .2s ease, background .15s ease;
  cursor: pointer;
}
.cs-press:active { transform: scale(0.97); }

.cs-card-press {
  transition: transform .25s cubic-bezier(.22,.9,.3,1), box-shadow .25s ease, border-color .15s;
  cursor: pointer;
}
.cs-card-press:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,58,15,0.10); }
.cs-card-press:active { transform: scale(0.98); }

/* ─── Tab bar ───────────────────────────────────────────────────── */
.cs-tab-bar {
  display: flex;
  align-items: center; justify-content: space-around;
  padding: 10px 14px calc(env(safe-area-inset-bottom, 0px) + 12px);
  background: rgba(250,248,242,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(26,58,15,0.08);
  position: relative; z-index: 10;
}
.cs-tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 14px;
  color: var(--cs-text-light);
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  border-radius: 12px;
  transition: color .18s ease, background .18s ease, transform .18s ease;
  flex: 1; min-width: 0;
}
.cs-tab.is-active { color: var(--cs-green-dark); }
.cs-tab.is-active .cs-tab-icon {
  background: var(--cs-green-pale);
  color: var(--cs-green-dark);
}
.cs-tab:active { transform: scale(0.93); }
.cs-tab-icon {
  width: 36px; height: 28px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cs-text-muted);
  transition: background .2s ease, color .18s;
}

/* Big primary scan button */
.cs-tab-scan {
  width: 56px; height: 56px;
  border-radius: 18px;
  background: linear-gradient(135deg, #4a9422 0%, #2d6016 100%);
  display: flex; align-items: center; justify-content: center;
  color: white;
  box-shadow: 0 8px 22px rgba(74,148,34,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .2s ease;
  position: relative;
  margin-top: -22px;
}
.cs-tab-scan:active { transform: scale(0.93); }
.cs-tab-scan::after {
  content: ''; position: absolute; inset: -6px; border-radius: 22px;
  border: 2px solid rgba(74,148,34,0.2);
  animation: scan-ring 2.4s ease-out infinite;
}
@keyframes scan-ring {
  0% { transform: scale(0.9); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* ─── Floating shimmer (skeleton) ───────────────────────────────── */
@keyframes shimmer {
  from { background-position: -200px 0; }
  to { background-position: 200px 0; }
}
.cs-shimmer {
  background: linear-gradient(90deg,
    rgba(26,58,15,0.06) 0%,
    rgba(26,58,15,0.12) 50%,
    rgba(26,58,15,0.06) 100%);
  background-size: 400px 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: 8px;
}

/* ─── Hero parallax decorations ─────────────────────────────────── */
@keyframes blobFloat {
  0%, 100% { transform: translate(0,0) rotate(0); }
  33% { transform: translate(8px, -10px) rotate(2deg); }
  66% { transform: translate(-6px, 8px) rotate(-2deg); }
}
.cs-blob { animation: blobFloat 8s ease-in-out infinite; }

/* ─── Sheet (bottom modal) ──────────────────────────────────────── */
.cs-sheet-overlay {
  position: absolute; inset: 0;
  background: rgba(20,18,14,0.45);
  backdrop-filter: blur(8px);
  z-index: 20;
  animation: fadeIn .25s ease-out;
}
.cs-sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: var(--cs-cream);
  border-radius: 28px 28px 0 0;
  z-index: 21;
  padding: 8px 18px 24px;
  box-shadow: 0 -20px 60px rgba(26,58,15,0.2);
  animation: sheetSlide .42s cubic-bezier(.22,.9,.3,1) both;
}
@keyframes sheetSlide { from { transform: translateY(100%); } to { transform: none; } }
.cs-sheet-handle {
  width: 38px; height: 4px; background: rgba(26,58,15,0.18);
  border-radius: 999px; margin: 0 auto 12px;
}

/* ─── Toast / feedback ──────────────────────────────────────────── */
@keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
.cs-toast {
  position: absolute; bottom: 100px; left: 50%;
  padding: 10px 18px;
  background: rgba(20,18,14,0.92);
  color: white;
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
  z-index: 30;
  animation: toastIn .35s cubic-bezier(.22,.9,.3,1) both;
  display: flex; align-items: center; gap: 8px;
  backdrop-filter: blur(20px);
}

/* ─── Premium ribbon ────────────────────────────────────────────── */
.cs-premium-ribbon {
  background: linear-gradient(135deg, #1a3a0f 0%, #2d6016 100%);
  color: var(--cs-cream);
  border-radius: 18px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.cs-premium-ribbon::after {
  content: ''; position: absolute;
  top: -30%; right: -10%;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(168,216,120,0.3) 0%, transparent 65%);
  pointer-events: none;
}

/* ─── Animated brand mark for splash ────────────────────────────── */
@keyframes spinIn {
  from { transform: rotate(-120deg) scale(0.5); opacity: 0; }
  to { transform: none; opacity: 1; }
}
.cs-mark-anim { animation: spinIn .8s cubic-bezier(.34,1.56,.64,1) both; }

</style>

/* CrocScore — Animations premium (compléments à prototype.css) */

/* ─── Background mesh animé ────────────────────────────────────────── */
.cs-mesh-bg {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(60% 50% at 20% 20%, rgba(168,216,120,0.18) 0%, transparent 60%),
    radial-gradient(50% 40% at 80% 70%, rgba(74,148,34,0.14) 0%, transparent 60%),
    radial-gradient(40% 60% at 50% 100%, rgba(232,245,216,0.6) 0%, transparent 70%);
  animation: mesh-shift 18s ease-in-out infinite;
}
[data-theme="dark"] .cs-mesh-bg {
  background:
    radial-gradient(60% 50% at 20% 20%, rgba(168,216,120,0.1) 0%, transparent 60%),
    radial-gradient(50% 40% at 80% 70%, rgba(74,148,34,0.12) 0%, transparent 60%);
}
@keyframes mesh-shift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(2%, -1%) scale(1.04); }
  66% { transform: translate(-1%, 2%) scale(0.98); }
}

/* ─── Hero text reveal (mot par mot) ──────────────────────────────── */
.cs-word {
  opacity: 0;
  transform: translateY(18px);
  display: inline-block;
  animation: word-reveal .65s cubic-bezier(.22, .9, .3, 1) forwards;
  animation-delay: calc(var(--w, 0) * 70ms + 100ms);
  will-change: transform, opacity;
}
@keyframes word-reveal {
  to { opacity: 1; transform: none; }
}

/* ─── Ripple effect ───────────────────────────────────────────────── */
.cs-ripple-host {
  position: relative;
  overflow: hidden;
}
.cs-ripple {
  position: absolute;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.22;
  pointer-events: none;
  transform: scale(0);
  animation: ripple .7s cubic-bezier(.22, .9, .3, 1) forwards;
}
@keyframes ripple {
  to { transform: scale(2.4); opacity: 0; }
}

/* ─── Magnetic / Tilt cards ───────────────────────────────────────── */
.cs-tilt {
  transform-style: preserve-3d;
  transform: perspective(900px) rotateX(0) rotateY(0) translate3d(0, 0, 0);
  transition: transform .35s cubic-bezier(.22, .9, .3, 1);
  will-change: transform;
}

/* ─── Particle burst (for high scores) ────────────────────────────── */
.cs-particles {
  position: absolute; inset: 0;
  pointer-events: none; overflow: visible;
}
.cs-particle {
  position: absolute; top: 50%; left: 50%;
  width: 10px; height: 10px;
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: particle-burst 1.4s cubic-bezier(.22, .9, .3, 1) forwards;
}
@keyframes particle-burst {

  <script type="text/babel" data-src="prototype/real-backend.jsx">
// CrocScore — Vrai backend (DB + scoring + Firebase Auth + Html5Qrcode)
// Source de vérité unique : le code de index.html

// ─── Scoring (copié exactement de index.html) ────────────────────────
function realScoreProduct(p) {
  let score = 50;
  const ingr = (p.ingredients_text || '').toLowerCase();
  const nutr = p.nutriments || {};
  const proteins = nutr.proteins_100g || 0;
  const fat = nutr.fat_100g || 0;
  const carbs = nutr.carbohydrates_100g || 0;
  if (proteins >= 30) score += 20;
  else if (proteins >= 20) score += 10;
  else if (proteins < 10) score -= 15;
  if (fat >= 10 && fat <= 20) score += 5;
  else if (fat > 25) score -= 5;
  if (carbs > 40) score -= 15;
  else if (carbs < 20) score += 10;
  const goodMeat = ['poulet','boeuf','poisson','saumon','canard','agneau','thon','dinde','veau'];
  const firstIngr = ingr.split(',')[0] || '';
  if (goodMeat.some(g => firstIngr.includes(g))) score += 15;
  if (['maïs','blé','farine de céréales','sous-produits','dérivés'].some(b => firstIngr.includes(b))) score -= 15;
  const cerealCount = (ingr.match(/maïs|blé|céréales|amidon|gluten/g) || []).length;
  score -= cerealCount * 5;
  if (goodMeat.filter(m => ingr.includes(m)).length >= 2) score += 10;
  score = Math.max(5, Math.min(99, Math.round(score)));
  let letter, bg, color;
  if (score >= 80)      { letter = 'A'; bg = '#e8f5d8'; color = '#1a3a0f'; }
  else if (score >= 60) { letter = 'B'; bg = '#d4f0a0'; color = '#2d6016'; }
  else if (score >= 40) { letter = 'C'; bg = '#fdedc0'; color = '#8b5e0a'; }
  else if (score >= 20) { letter = 'D'; bg = '#fdd8b0'; color = '#8b3a0a'; }
  else                  { letter = 'E'; bg = '#f8c8c8'; color = '#b46400'; }
  return { score, letter, bg, color };
}

// ─── Produits custom (saisis manuellement, stockés localement) ───────
function realGetCustomProducts() {
  try { return JSON.parse(localStorage.getItem('croc_custom_products') || '[]'); }
  catch (e) { return []; }
}

// ─── Recherche locale par nom (DB + produits custom) ─────────────────
function realSearchByName(query) {
  if (!query || query.length < 2) return null;
  const baseDb = (typeof LOCAL_DB !== 'undefined') ? LOCAL_DB : [];
  const db = baseDb.concat(realGetCustomProducts());
  if (!db.length) return null;
  const q = query.toLowerCase().trim();
  const exact = db.find(p => (p.product_name || '').toLowerCase() === q);
  if (exact) return exact;
  const words = q.split(/\s+/).filter(w => w.length > 1);
  return db.find(p => {
    const n = (p.product_name || '').toLowerCase();
    const b = (p.brands || '').toLowerCase();
    return words.every(w => n.includes(w) || b.includes(w));
  }) || null;
}

// ─── Recherche texte : local (DB + custom) puis OPFF search API ──────
// Retourne { product, source } ou null. Reproduit doSearch() de index.html.
async function realSearchByText(query) {
  if (!query || !query.trim()) return null;
  const val = query.trim();
  // 1. Base locale + produits custom
  const local = realSearchByName(val);
  if (local) return { product: local, source: 'local' };
  // 2. API Open Pet Food Facts (recherche plein texte)
  try {
    const res = await fetch(
      'https://world.openpetfoodfacts.org/cgi/search.pl?search_terms='
      + encodeURIComponent(val) + '&search_simple=1&action=process&json=1&page_size=1'
    );
    const data = await res.json();
    if (data.products && data.products.length > 0) {
      return { product: data.products[0], source: 'api' };
    }
  } catch (e) {}
  return null; // → l'appelant ouvrira la saisie manuelle
}

// ─── Construire un produit à partir d'une saisie manuelle ────────────
// Reproduit submitManualForm() de index.html. Sauvegarde optionnelle.
function realBuildManualProduct({ name, prot, fat, carb, ingr, save }) {
  const product = {
    product_name: name || 'Produit saisi',
    nutriments: {
      proteins_100g: parseFloat(prot) || 0,
      fat_100g: parseFloat(fat) || 0,
      carbohydrates_100g: parseFloat(carb) || 0,
    },
    ingredients_text: ingr || '',
    _custom: true,
  };
  if (save && name) {
    try {
      const custom = realGetCustomProducts();
      if (!custom.find(p => (p.product_name || '').toLowerCase() === name.toLowerCase())) {
        custom.push(product);
        localStorage.setItem('croc_custom_products', JSON.stringify(custom));
      }
    } catch (e) {}
  }
  return realProductToView(product, name);
}

// ─── Export RGPD (Art. 20 — portabilité) ─────────────────────────────
// Reproduit exportMyData() de index.html : télécharge un JSON.
function realExportData() {
  let user = null;
  try {
    if (window._csAuth && window._csAuth.currentUser) {
      const u = window._csAuth.currentUser;
      user = { name: u.displayName, email: u.email, uid: u.uid };
    }
  } catch (e) {}
  const data = {
    exportDate: new Date().toISOString(),
    rgpd: 'Export généré conformément à l\'Art. 20 RGPD (droit à la portabilité).',
    compte: user,
    consentement: safeParse('croc_account_consent'),
    cookies: safeParse('cs_cookies_choice'),
    theme: localStorageGet('cs_theme'),
    produitsPersonnalises: realGetCustomProducts(),
    historiqueLocal: safeParse('croc_scan_history') || [],
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mes-donnees-crocscore-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  return true;
}

function safeParse(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch (e) { return null; }
}
function localStorageGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}

// ─── Recherche par code-barres : local puis OPFF API ─────────────────
async function realFetchByBarcode(barcode) {
  const db = (typeof LOCAL_DB !== 'undefined') ? LOCAL_DB : [];
  const local = db.find(p => p.barcode === barcode);
  if (local) return { product: local, source: 'local' };
  try {
    const r = await fetch('https://world.openpetfoodfacts.org/api/v0/product/' + barcode + '.json');
    const data = await r.json();
    if (data.status === 1 && data.product) {
      const name = data.product.product_name || barcode;
      const localByName = realSearchByName(name);
      return { product: localByName || data.product, source: 'api', barcode };
    }
  } catch (e) {}
  return null;
}

// ─── Mapping produit → format ResultView ─────────────────────────────
// Le ResultView du prototype attend : { ean, brand, name, size, score, macros, ingredients, verdict, additives }
function realProductToView(p, fallbackName) {
  const scored = realScoreProduct(p);
  const nutr = p.nutriments || {};
  const ingr = (p.ingredients_text || '').toLowerCase();
  const meatList = ['poulet','boeuf','saumon','canard','agneau','dinde','poisson','thon','veau'];
  const meatCount = meatList.filter(m => ingr.includes(m)).length;
  const verdict = scored.letter === 'A' ? 'Excellente composition, équilibre nutritionnel optimal.'
                : scored.letter === 'B' ? 'Bonne composition globale, légères réserves.'
                : scored.letter === 'C' ? 'Composition correcte mais améliorable.'
                : scored.letter === 'D' ? 'Composition faible, à compléter ou éviter.'
                                        : 'Composition très défavorable, à éviter pour la santé de votre animal.';
  return {
    ean: p.barcode || '—',
    brand: p.brands || 'Marque inconnue',
    name: p.product_name || fallbackName || 'Produit',
    size: p.quantity || '',
    score: scored.score,
    letter: scored.letter,
    bg: scored.bg,
    fgColor: scored.color,
    macros: {
      prot: Math.round(nutr.proteins_100g || 0),
      fat: Math.round(nutr.fat_100g || 0),
      carb: Math.round(nutr.carbohydrates_100g || 0),
      meat: Math.min(100, meatCount * 25),
    },
    ingredients: p.ingredients_text || 'Composition non disponible',
    additives: p.additives_tags && p.additives_tags.length
      ? p.additives_tags.length + ' additifs détectés'
      : 'Aucun additif technologique détecté',
    verdict,
  };
}

// ─── Firebase Auth helpers ───────────────────────────────────────────
async function realSignIn(email, password) {
  if (!window._csAuth) throw new Error('Firebase non disponible. Réessayez dans un instant.');
  const cred = await window._csAuth.signInWithEmailAndPassword(email, password);
  return cred.user;
}

async function realSignUp({ email, password, name }) {
  if (!window._csAuth) throw new Error('Firebase non disponible. Réessayez dans un instant.');
  const cred = await window._csAuth.createUserWithEmailAndPassword(email, password);
  if (name && cred.user) {
    try { await cred.user.updateProfile({ displayName: name.substring(0, 50) }); } catch (e) {}
  }
  // Trace du consentement CGU (Art. 7 RGPD)
  try {
    localStorage.setItem('croc_account_consent', JSON.stringify({
      version: '1.0', date: Date.now(), dateISO: new Date().toISOString(),
      ageConfirmed: true, cguAccepted: true, email,
    }));
  } catch (e) {}
  return cred.user;
}

async function realSignOut() {
  if (!window._csAuth) return;
  await window._csAuth.signOut();
}

async function realResetPassword(email) {
  if (!window._csAuth) throw new Error('Firebase non disponible.');
  await window._csAuth.sendPasswordResetEmail(email);
}

function realAuthErrorMessage(code) {
  const msgs = {
    'auth/email-already-in-use': 'Cet email est déjà utilisé. Connectez-vous ou utilisez "Mot de passe oublié".',
    'auth/invalid-email': 'Adresse email invalide.',
    'auth/weak-password': 'Mot de passe trop faible (6 caractères minimum).',
    'auth/user-not-found': 'Aucun compte trouvé avec cet email.',
    'auth/wrong-password': 'Mot de passe incorrect.',
    'auth/invalid-credential': 'Email ou mot de passe incorrect.',
    'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
    'auth/network-request-failed': 'Problème de connexion réseau.',
  };
  return msgs[code] || ('Erreur d\'authentification (' + (code || 'inconnue') + ')');
}

// ─── Subscribe to auth state changes ─────────────────────────────────
function realOnAuthChange(cb) {
  if (!window._csAuth) return () => {};
  return window._csAuth.onAuthStateChanged(function(user) {
    if (user) {
      cb({
        name: user.displayName || (user.email || '').split('@')[0],
        email: user.email,
        uid: user.uid,
        plan: 'free',
      });
    } else {
      cb(null);
    }
  });
}

// ─── Html5Qrcode wrapper (real camera scan) ──────────────────────────
function realStartScanner(elementId, onDetected, onError) {
  if (typeof Html5Qrcode === 'undefined') {
    onError && onError(new Error('Scanner indisponible'));
    return null;
  }
  const scanner = new Html5Qrcode(elementId);
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decodedText) => { onDetected && onDetected(decodedText); },
    () => {}
  ).catch((err) => { onError && onError(err); });
  return scanner;
}

function realStopScanner(scanner) {
  if (scanner) {
    try { scanner.stop().catch(() => {}); } catch (e) {}
  }
}

// Expose globally
Object.assign(window, {
  realScoreProduct, realSearchByName, realSearchByText, realFetchByBarcode, realProductToView,
  realGetCustomProducts, realBuildManualProduct, realExportData,
  realSignIn, realSignUp, realSignOut, realResetPassword, realAuthErrorMessage,
  realOnAuthChange, realStartScanner, realStopScanner,
});

</script>
  <script type="text/babel" data-src="prototype/anim-helpers.jsx">
// CrocScore — Animation helpers (hooks + utility components)

const { useEffect: useEffectAnim, useRef: useRefAnim, useState: useStateAnim } = React;

// ─── Count-up animated number ────────────────────────────────────────
function CSCountUp({ to = 100, duration = 1400, delay = 0, suffix = '', prefix = '' }) {
  const [val, setVal] = useStateAnim(0);
  useEffectAnim(() => {
    let raf;
    const start = performance.now() + delay;
    const from = 0;
    function tick(t) {
      if (t < start) { raf = requestAnimationFrame(tick); return; }
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(from + (to - from) * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => raf && cancelAnimationFrame(raf);
  }, [to, duration, delay]);
  return (
    <span className="cs-count-up">
      {prefix}{Math.round(val)}{suffix}
    </span>
  );
}

// ─── Word-by-word reveal ─────────────────────────────────────────────
function CSWordReveal({ children, baseDelay = 0, style }) {
  if (typeof children !== 'string') return <span>{children}</span>;
  const words = children.split(/(\s+)/);
  let wordIndex = 0;
  return (
    <span style={style}>
      {words.map((w, i) => {
        if (/^\s+$/.test(w)) return <span key={i}>{w}</span>;
        const idx = wordIndex++;
        return (
          <span key={i} className="cs-word" style={{ '--w': idx + baseDelay }}>
            {w}
          </span>
        );
      })}
    </span>
  );
}

// ─── Ripple on click ─────────────────────────────────────────────────
function csRipple(e) {
  const el = e.currentTarget;
  if (!el) return;
  const r = el.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'cs-ripple';
  const size = Math.max(r.width, r.height) * 1.4;
  rip.style.width = rip.style.height = size + 'px';
  const cx = (e.clientX || (r.left + r.width / 2)) - r.left - size / 2;
  const cy = (e.clientY || (r.top + r.height / 2)) - r.top - size / 2;
  rip.style.left = cx + 'px';
  rip.style.top = cy + 'px';
  el.appendChild(rip);
  setTimeout(() => rip.remove(), 700);
}

// ─── Magnetic / Tilt card on hover (desktop only) ───────────────────
function useCsTilt(maxTilt = 6, scale = 1.01) {
  const ref = useRefAnim(null);
  useEffectAnim(() => {
    const el = ref.current; if (!el) return;
    if (window.matchMedia('(hover: none)').matches) return;
    let raf;
    function onMove(e) {
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      const tiltX = (y - 0.5) * -maxTilt;
      const tiltY = (x - 0.5) * maxTilt;
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(900px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(${scale})`;
      });
    }
    function onLeave() {
      if (raf) cancelAnimationFrame(raf);
      el.style.transform = '';
    }
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [maxTilt, scale]);
  return ref;
}

// ─── Particle burst (used on great scores) ───────────────────────────
function ParticleBurst({ count = 18, color = '#a8d878', show = true, palette }) {
  if (!show) return null;
  const colors = palette || [color];
  return (
    <div className="cs-particles">
      {Array.from({ length: count }).map((_, i) => {
        const angle = (i / count) * Math.PI * 2;
        const distance = 70 + Math.random() * 50;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        const c = colors[i % colors.length];
        return (
          <div key={i} className="cs-particle" style={{
            background: c,
            boxShadow: '0 0 6px ' + c,
            '--px': tx + 'px',
            '--py': ty + 'px',
            animationDelay: (Math.random() * 0.15) + 's',
          }} />
        );
      })}
    </div>
  );
}

// ─── Confetti for grade A ────────────────────────────────────────────
function ConfettiBurst({ count = 24, show = true }) {
  if (!show) return null;
  const colors = ['#a8d878', '#4a9422', '#fdedc0', '#d4f0a0', '#e8f5d8'];
  return (
    <div className="cs-particles">
      {Array.from({ length: count }).map((_, i) => {
        const angle = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI;
        const distance = 100 + Math.random() * 120;
        const cx = Math.cos(angle) * distance;
        const cy = Math.sin(angle) * distance + Math.random() * 60;
        return (
          <div key={i} className="cs-confetti" style={{
            background: colors[i % colors.length],
            '--cx': cx + 'px',
            '--cy': cy + 'px',
            animationDelay: (Math.random() * 0.3) + 's',
          }} />
        );
      })}
    </div>
  );
}

// ─── Sparkle (decoration on premium card) ────────────────────────────
function Sparkles({ count = 6 }) {
  return (
    <>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} className="cs-sparkle" style={{
          top: (10 + Math.random() * 80) + '%',
          left: (5 + Math.random() * 90) + '%',
          animationDelay: (i * 0.4 + Math.random() * 0.5) + 's',
          animationDuration: (2 + Math.random() * 2) + 's',
        }} />
      ))}
    </>
  );
}

// ─── Theme transition (circular wipe) ────────────────────────────────
function csAnimateThemeChange(e, applyTheme) {
  // If View Transitions API is available, use it (smoother)
  if (document.startViewTransition) {
    try {
      const x = e?.clientX ?? window.innerWidth / 2;
      const y = e?.clientY ?? window.innerHeight / 2;
      document.documentElement.style.setProperty('--cs-theme-x', x + 'px');
      document.documentElement.style.setProperty('--cs-theme-y', y + 'px');
      document.startViewTransition(() => applyTheme());
      return;
    } catch (err) {}
  }
  // Fallback: clip-path animation on the phone container
  const phone = document.querySelector('.cs-phone');
  if (phone) {
    const r = phone.getBoundingClientRect();
    const x = ((e?.clientX ?? r.left + r.width / 2) - r.left);
    const y = ((e?.clientY ?? r.top + r.height / 2) - r.top);
    phone.style.setProperty('--cs-theme-x', x + 'px');
    phone.style.setProperty('--cs-theme-y', y + 'px');
    applyTheme();
    phone.classList.remove('cs-theme-reveal');
    void phone.offsetWidth; // reflow
    phone.classList.add('cs-theme-reveal');
    setTimeout(() => phone.classList.remove('cs-theme-reveal'), 800);
  } else {
    applyTheme();
  }
}

Object.assign(window, {
  CSCountUp, CSWordReveal, csRipple, useCsTilt,
  ParticleBurst, ConfettiBurst, Sparkles, csAnimateThemeChange,
});

</script>

// ─── Theme management ────────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('cs_theme') || 'light'; }
    catch (e) { return 'light'; }
  });
  useEffect(() => {
    try { localStorage.setItem('cs_theme', theme); } catch (e) {}
  }, [theme]);
  return [theme, setTheme];
}

// ─── User state — bridge to real Firebase Auth ───────────────────────
function useAuth() {
  const [user, setUser] = useState(null);
  useEffect(() => {
    // Try subscribing to real Firebase Auth
    if (typeof window.realOnAuthChange === 'function') {
      const unsub = window.realOnAuthChange((u) => setUser(u));
      return unsub;
    }
    // Fallback: localStorage
    try {
      const stored = localStorage.getItem('cs_user');
      if (stored) setUser(JSON.parse(stored));
    } catch (e) {}
  }, []);
  function signIn(profile) { setUser(profile); }
  function signOut() {
    if (typeof window.realSignOut === 'function') {
      window.realSignOut().catch(() => {});
    }
    setUser(null);
  }
  return [user, signIn, signOut];
}

      } catch (e) {}

  function go(name, dir = 'right') { setView({ name, dir }); }

  <script type="text/babel" data-src="prototype/scan-result.jsx">
// CrocScore — Prototype : Scan + Result (avec VRAI scanner + DB)

function ScanView({ onBack, onComplete, onManual, activeAnimal, dir }) {
  const [phase, setPhase] = useState('scanning'); // scanning | found | not-found | error
  const [foundProduct, setFoundProduct] = useState(null);
  const [errorMsg, setErrorMsg] = useState('');
  const [progress, setProgress] = useState(0);
  const scannerRef = useRef(null);
  const detectedRef = useRef(false);

  // Progress decorative animation
  useEffect(() => {
    if (phase !== 'scanning') return;
    let p = 0;
    const id = setInterval(() => {
      p = Math.min(100, p + Math.random() * 8 + 2);
      setProgress(p);
    }, 200);
    return () => clearInterval(id);
  }, [phase]);

  // Start real camera scanner
  useEffect(() => {
    if (phase !== 'scanning') return;
    if (typeof window.realStartScanner !== 'function') {
      setErrorMsg('Scanner indisponible sur ce navigateur.');
      setPhase('error');
      return;
    }
    // Wait for DOM element to exist
    const tryStart = () => {
      if (!document.getElementById('cs-real-reader')) {
        setTimeout(tryStart, 100);
        return;
      }
      detectedRef.current = false;
      scannerRef.current = window.realStartScanner(
        'cs-real-reader',
        async (barcode) => {
          if (detectedRef.current) return;
          detectedRef.current = true;
          window.realStopScanner(scannerRef.current);
          scannerRef.current = null;
          // Lookup
          const result = await window.realFetchByBarcode(barcode);
          if (result && result.product) {
            const view = window.realProductToView(result.product, barcode);
            setFoundProduct(view);
            setPhase('found');
          } else {
            setErrorMsg('Code-barres ' + barcode + ' non trouvé dans notre base.');
            setPhase('not-found');
          }
        },
        (err) => {
          console.warn('Scanner error:', err);
          setErrorMsg("Impossible d'accéder à la caméra. Vérifiez les permissions.");
          setPhase('error');
        }
      );
    };
    tryStart();
    return () => {
      window.realStopScanner(scannerRef.current);
      scannerRef.current = null;
    };
  }, [phase]);

  function confirm() {
    onComplete(foundProduct);
  }

  function manualBarcode() {
    const code = prompt('Entrez le code-barres manuellement :');
    if (!code || !code.trim()) return;
    detectedRef.current = true;
    window.realStopScanner(scannerRef.current);
    scannerRef.current = null;
    (async () => {
      const result = await window.realFetchByBarcode(code.trim());
      if (result && result.product) {
        const view = window.realProductToView(result.product, code.trim());
        setFoundProduct(view);
        setPhase('found');
      } else {
        setErrorMsg('Code-barres ' + code + ' non trouvé.');
        setPhase('not-found');
      }
    })();
  }

  return (
    <div className={`cs-screen enter-${dir === 'right' ? 'right' : 'fade'}`}
      style={{ background: '#0b1408', color: '#fff' }}>
      {/* Live camera feed (real Html5Qrcode) */}
      <div id="cs-real-reader" style={{
        position: 'absolute', inset: 0,
        background: '#0b1408',
        overflow: 'hidden',
      }} />

      {/* Dark vignette overlay over camera */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none',
        background: 'radial-gradient(ellipse at center, transparent 30%, rgba(11,20,8,0.6) 100%)',
      }} />

      <div className="cs-status-pad" />

      {/* Top bar */}
      <div style={{
        position: 'relative', zIndex: 5,
        padding: '8px 16px 0', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button className="cs-press" onClick={onBack} style={{
          width: 38, height: 38, borderRadius: 999,
          background: 'rgba(255,255,255,0.14)', backdropFilter: 'blur(20px)',
          border: 'none', color: '#fff', fontSize: 18,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>

        <div style={{
          padding: '7px 14px', background: 'rgba(168,216,120,0.18)',
          backdropFilter: 'blur(20px)', borderRadius: 999,
          fontSize: 12, fontWeight: 600, color: '#a8d878',
          display: 'flex', alignItems: 'center', gap: 8,
          border: '1px solid rgba(168,216,120,0.3)',
        }}>
          <span style={{ width: 6, height: 6, background: '#a8d878', borderRadius: 999,
            boxShadow: '0 0 8px #a8d878' }}></span>
          {phase === 'scanning' ? 'Recherche…'
            : phase === 'found' ? 'Trouvé !'
            : phase === 'not-found' ? 'Non trouvé'
            : 'Erreur'}
        </div>

        <button className="cs-press" onClick={manualBarcode} style={{
          width: 38, height: 38, borderRadius: 999,
          background: 'rgba(255,255,255,0.14)', backdropFilter: 'blur(20px)',
          border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center',
        }} aria-label="Saisir le code manuellement">
          <CSIconScan size={16} color="#fff" />
        </button>
      </div>

      {/* Reticle */}
      <div style={{
        position: 'relative', zIndex: 1, flex: 1,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexDirection: 'column', gap: 20, pointerEvents: 'none',
      }}>
        <div style={{ width: 260, height: 180, position: 'relative' }}>
          {[
            { top: 0, left: 0 },
            { top: 0, right: 0, transform: 'scaleX(-1)' },
            { bottom: 0, right: 0, transform: 'scale(-1,-1)' },
            { bottom: 0, left: 0, transform: 'scaleY(-1)' },
          ].map((pos, i) => (
            <svg key={i} className={phase === 'scanning' ? 'cs-reticle-corner' : ''}
              width="38" height="38" viewBox="0 0 36 36"
              style={{ position: 'absolute', ...pos }}>
              <path d="M3 13V5a2 2 0 0 1 2-2h8"
                stroke="#a8d878" strokeWidth="3" fill="none" strokeLinecap="round" />
            </svg>
          ))}
          {phase === 'scanning' && (
            <div style={{
              position: 'absolute', top: '50%', left: 14, right: 14, height: 2,
              background: 'linear-gradient(90deg, transparent 0%, #a8d878 50%, transparent 100%)',
              boxShadow: '0 0 18px #a8d878',
            }} className="cs-laser"></div>
          )}
        </div>
      </div>

      {phase === 'scanning' && (
        <>
          <div style={{ position: 'relative', zIndex: 2, padding: '0 32px', textAlign: 'center', marginBottom: 18 }}>
            <div style={{
              fontFamily: cs.serif, fontSize: 22, fontWeight: 500,
              letterSpacing: '-0.3px', lineHeight: 1.2,
            }}>
              Pointez un <em style={{ fontStyle: 'italic', color: '#a8d878' }}>code-barres</em>
            </div>
            <div style={{ fontSize: 13, opacity: 0.65, marginTop: 8, lineHeight: 1.5 }}>
              Détection automatique. Caméra active.
            </div>
          </div>
          <div style={{ position: 'relative', zIndex: 2, padding: '0 20%', marginBottom: 100 }}>
            <div style={{
              height: 3, background: 'rgba(255,255,255,0.1)',
              borderRadius: 999, overflow: 'hidden',
            }}>
              <div style={{
                width: progress + '%', height: '100%',
                background: 'linear-gradient(90deg, #a8d878, #4a9422)',
                borderRadius: 999, transition: 'width .25s ease',
              }}></div>
            </div>
          </div>
        </>
      )}

      {/* Found sheet */}
      {phase === 'found' && foundProduct && (
        <>
          <div className="cs-sheet-overlay" />
          <div className="cs-sheet" style={{ paddingBottom: 28 }}>
            <div className="cs-sheet-handle" />
            <div style={{ padding: '8px 6px' }}>
              <div style={{ fontSize: 11.5, color: cs.muted, fontWeight: 600,
                letterSpacing: '0.05em', textTransform: 'uppercase' }}>
                Produit trouvé
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginTop: 14 }}>
                <div className="cs-placeholder" style={{ width: 56, height: 72, fontSize: 9, flex: '0 0 auto' }}>SAC</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, color: cs.muted }}>{foundProduct.brand}</div>
                  <div style={{
                    fontFamily: cs.serif, fontSize: 18, fontWeight: 500,
                    color: cs.greenDark, lineHeight: 1.2, letterSpacing: '-0.2px',
                  }}>
                    {foundProduct.name}
                  </div>
                  <div style={{ fontSize: 11.5, color: cs.faint, marginTop: 3, fontFamily: cs.mono }}>
                    EAN · {foundProduct.ean}
                  </div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, marginTop: 18 }}>
                <CSButton variant="secondary" size="md" style={{ flex: 1, justifyContent: 'center' }}
                  onClick={onBack}>Pas ça</CSButton>
                <CSButton variant="primary" size="md" style={{ flex: 1, justifyContent: 'center' }}
                  onClick={confirm} trailing={<CSIconArrow size={14} />}>Analyser</CSButton>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Not found / error */}
      {(phase === 'not-found' || phase === 'error') && (
        <>
          <div className="cs-sheet-overlay" />
          <div className="cs-sheet" style={{ paddingBottom: 28 }}>
            <div className="cs-sheet-handle" />
            <div style={{ padding: '8px 6px' }}>
              <div style={{ fontSize: 11.5, color: '#c44020', fontWeight: 600,
                letterSpacing: '0.05em', textTransform: 'uppercase' }}>
                {phase === 'error' ? 'Erreur' : 'Produit inconnu'}
              </div>
              <div style={{ fontFamily: cs.serif, fontSize: 18, fontWeight: 500,
                color: cs.greenDark, lineHeight: 1.25, marginTop: 8 }}>
                {errorMsg}
              </div>
              <p style={{ fontSize: 13, color: cs.muted, lineHeight: 1.5, marginTop: 10 }}>
                {phase === 'not-found'
                  ? "Le produit n'est pas dans notre base ni dans Open Pet Food Facts. Vous pouvez réessayer ou faire une recherche par nom."
                  : "Vérifiez les permissions caméra de votre navigateur, ou saisissez le code-barres manuellement."}
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 18 }}>
                <CSButton variant="primary" size="md" style={{ width: '100%', justifyContent: 'center' }}
                  onClick={() => { window.realStopScanner(scannerRef.current); scannerRef.current = null; onManual && onManual(''); }}>
                  Renseigner manuellement
                </CSButton>
                <div style={{ display: 'flex', gap: 10 }}>
                  <CSButton variant="secondary" size="md" style={{ flex: 1, justifyContent: 'center' }}
                    onClick={onBack}>Retour</CSButton>
                  <CSButton variant="secondary" size="md" style={{ flex: 1, justifyContent: 'center' }}
                    onClick={manualBarcode}>Saisir un code</CSButton>
                </div>
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// Animated ring with CSS custom prop for stroke offset
function AnimatedGradeRing({ score, letter, c }) {
  const size = 130, strokeWidth = 10;
  const r = (size - strokeWidth) / 2;
  const C = 2 * Math.PI * r;
  const targetOffset = C - (Math.min(Math.max(score, 0), 100) / 100) * C;

  // Animated number count
  const [displayScore, setDisplayScore] = useState(0);
  useEffect(() => {
    const start = performance.now();
    const duration = 900;
    let raf;
    function tick(t) {
      const elapsed = t - start;
      const p = Math.min(1, elapsed / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplayScore(Math.round(score * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    }
    const delay = setTimeout(() => { raf = requestAnimationFrame(tick); }, 1100);
    return () => { clearTimeout(delay); if (raf) cancelAnimationFrame(raf); };
  }, [score]);

  return (
    <div style={{ position: 'relative', width: size, height: size, flex: '0 0 auto' }}>
      {/* Particle burst / confetti for high scores */}
      {letter === 'A' && <ConfettiBurst count={26} />}
      {letter === 'B' && <ParticleBurst count={14} color={c.fg} />}

      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
        style={{ '--ring-c': C, '--ring-target': targetOffset, position: 'relative', zIndex: 1 }}>
        <circle cx={size/2} cy={size/2} r={r} stroke="rgba(26,58,15,0.07)"
          strokeWidth={strokeWidth} fill="none" />
        <circle className="cs-ring-fg"
          cx={size/2} cy={size/2} r={r}
          stroke={c.fg} strokeWidth={strokeWidth} fill="none"
          strokeLinecap="round"
          strokeDasharray={C}
          strokeDashoffset={targetOffset}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ strokeDasharray: C, filter: `drop-shadow(0 0 8px ${c.fg}40)` }}
        />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 2,
      }}>
        <div className="cs-grade-letter" style={{
          fontFamily: cs.serif, fontSize: size * 0.45, fontWeight: 600,
          color: c.fg, lineHeight: 0.9,
        }}>{letter}</div>
        <div className="cs-score-num" style={{
          fontFamily: cs.mono, fontSize: size * 0.08, fontWeight: 500,
          color: cs.muted, marginTop: 6, letterSpacing: '0.04em',
        }}>
          {displayScore} <span style={{ color: cs.faint }}>/100</span>
        </div>
      </div>
    </div>
  );
}

  <script type="text/babel" data-src="prototype/account-auth.jsx">
// CrocScore — Vues Auth + Compte

// ─── Auth (sign in / sign up avec CGU) ───────────────────────────────
function AuthView({ onBack, onSignIn, onGo, dir }) {
  const [tab, setTab] = useState('signin');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [name, setName] = useState('');
  const [pwVisible, setPwVisible] = useState(false);
  const [cguOk, setCguOk] = useState(false);
  const [ageOk, setAgeOk] = useState(false);
  const [marketing, setMarketing] = useState(false);
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function trySignIn() {
    setErr('');
    if (!email.includes('@')) { setErr('Email invalide.'); return; }
    if (pw.length < 6) { setErr('Mot de passe trop court.'); return; }
    setBusy(true);
    try {
      const user = await window.realSignIn(email, pw);
      onSignIn({
        name: user.displayName || email.split('@')[0],
        email: user.email, uid: user.uid, plan: 'free',
      });
    } catch (e) {
      setErr(window.realAuthErrorMessage(e.code) || e.message);
    } finally { setBusy(false); }
  }

  async function trySignUp() {
    setErr('');
    if (!name) return setErr('Indiquez votre prénom.');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setErr('Adresse email invalide.');
    if (pw.length < 6) return setErr('Mot de passe : 6 caractères minimum.');
    if (!ageOk) return setErr('Vous devez certifier avoir 15 ans ou plus (Art. 8 RGPD).');
    if (!cguOk) return setErr("Acceptez les CGU et la politique de confidentialité.");
    setBusy(true);
    try {
      const user = await window.realSignUp({ email, password: pw, name });
      onSignIn({
        name: user.displayName || name,
        email: user.email, uid: user.uid, plan: 'free', marketing,
      });
    } catch (e) {
      setErr(window.realAuthErrorMessage(e.code) || e.message);
    } finally { setBusy(false); }
  }

  async function tryReset() {
    setErr('');
    if (!email.includes('@')) { setErr('Entrez votre email puis réessayez.'); return; }
    try {
      await window.realResetPassword(email);
      setErr('✓ Email de réinitialisation envoyé à ' + email);
    } catch (e) {
      setErr(window.realAuthErrorMessage(e.code) || e.message);
    }
  }

  return (
    <div className={`cs-screen enter-${dir === 'right' ? 'right' : 'left'}`}>
      <div className="cs-status-pad" />
      <TopBar title={tab === 'signin' ? 'Se connecter' : 'Créer un compte'} onBack={onBack} />

      <div className="cs-screen-scroll" style={{ padding: '4px 20px 24px' }}>
        <div className="cs-fade-up" style={{ marginBottom: 20 }}>
          <div style={{
            width: 60, height: 60, borderRadius: 18,
            background: cs.accentTint, margin: '0 auto 16px',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <CSIconLock size={26} color={cs.accent} />
          </div>
          <h1 style={{
            fontFamily: cs.serif, fontSize: 26, fontWeight: 500,
            color: cs.ink, textAlign: 'center', letterSpacing: '-0.4px',
            margin: 0, lineHeight: 1.2,
          }}>
            {tab === 'signin'
              ? <>Heureux de vous <em style={{ fontStyle: 'italic', color: cs.accent }}>retrouver</em>.</>
              : <>Suivez le régime de <em style={{ fontStyle: 'italic', color: cs.accent }}>vos animaux</em>.</>}
          </h1>
          <p style={{ fontSize: 13, color: cs.muted, textAlign: 'center', marginTop: 8, lineHeight: 1.5 }}>
            {tab === 'signin' ? 'Connectez-vous pour retrouver votre historique de scans.'
              : 'Compte gratuit. Vos données restent en UE, jamais vendues à des tiers.'}
          </p>
        </div>

        {/* Tabs */}
        <div className="cs-fade-up" style={{ animationDelay: '.08s',
          display: 'flex', background: cs.surface, borderRadius: 12,

          {[['signin', 'Se connecter'], ['signup', 'Créer']].map(([k, l]) => (
            <button key={k} onClick={() => { setTab(k); setErr(''); }} className="cs-press" style={{
              flex: 1, padding: '10px 14px', fontSize: 13.5, fontWeight: 600,

        </div>

        {/* Form */}
        <div className="cs-fade-up" style={{ animationDelay: '.12s' }}>
          {tab === 'signup' && (
            <Field label="Prénom" value={name} onChange={setName} placeholder="Votre prénom" />
          )}
          <Field label="Email" value={email} onChange={setEmail}
            placeholder="votre@email.com" type="email" />
          {tab === 'signup' && (
            <div style={{
              fontSize: 11, color: cs.muted, margin: '-10px 0 12px',
              lineHeight: 1.4, padding: '0 4px',
            }}>
              Utilisé pour l'authentification — non partagé à des tiers (Art. 6.1.b RGPD).
            </div>
          )}
          <Field label="Mot de passe" value={pw} onChange={setPw}
            placeholder={tab === 'signup' ? '6 caractères minimum' : 'Votre mot de passe'}
            type={pwVisible ? 'text' : 'password'}
            trailing={
              <button className="cs-press" onClick={() => setPwVisible(!pwVisible)} style={{
                background: 'transparent', border: 'none', color: cs.muted, cursor: 'pointer',
                padding: 4, display: 'flex',
              }}>
                {pwVisible ? <CSIconLock size={16} /> : <CSIconInfo size={16} />}
              </button>
            }
          />
          {tab === 'signup' && (
            <div style={{
              fontSize: 11, color: cs.muted, margin: '-10px 0 14px',
              lineHeight: 1.4, padding: '0 4px',
            }}>
              Chiffré par Firebase Auth (Google). CrocScore ne stocke jamais votre mot de passe en clair.
            </div>
          )}

          {tab === 'signup' && (
            <div style={{
              background: cs.surface2, borderRadius: 12, padding: 14, marginTop: 4,
              border: `1px solid ${cs.border}`,
            }}>
              <Check checked={ageOk} onToggle={() => setAgeOk(!ageOk)}>
                Je certifie avoir <strong>15 ans ou plus</strong> (Art. 8 RGPD).
              </Check>
              <div style={{ height: 12 }} />
              <Check checked={cguOk} onToggle={() => setCguOk(!cguOk)}>
                J'ai lu et j'accepte les{' '}
                <a onClick={(e) => { e.stopPropagation(); onGo('legal', 'right'); }}
                  style={{ color: cs.accent, fontWeight: 600 }}>CGU</a>
                {' '}et la{' '}
                <a onClick={(e) => { e.stopPropagation(); onGo('legal', 'right'); }}
                  style={{ color: cs.accent, fontWeight: 600 }}>politique de confidentialité</a>.
              </Check>
              <div style={{ height: 12 }} />
              <Check checked={marketing} onToggle={() => setMarketing(!marketing)}>
                <span style={{ color: cs.muted }}>
                  (Optionnel) Recevoir le résumé mensuel et conseils par email — révocable à tout moment.
                </span>
              </Check>
            </div>
          )}

          {tab === 'signin' && (
            <a onClick={tryReset} style={{
              display: 'block', textAlign: 'right', fontSize: 12, color: cs.accent,
              fontWeight: 500, marginTop: -4, marginBottom: 14, cursor: 'pointer',
            }}>Mot de passe oublié ?</a>
          )}

          {err && (
            <div className="cs-fade-up" style={{
              padding: '10px 12px', background: 'rgba(180, 60, 40, 0.12)',
              borderRadius: 10, color: '#c44020', fontSize: 12.5, marginTop: 4, marginBottom: 14,
              border: '1px solid rgba(180,60,40,0.2)',
            }}>{err}</div>
          )}

          <CSButton variant="primary" size="lg" style={{ width: '100%', justifyContent: 'center', marginTop: 6, opacity: busy ? 0.7 : 1 }}
            onClick={tab === 'signin' ? trySignIn : trySignUp}>
            {busy ? '… patientez' : (tab === 'signin' ? 'Se connecter' : 'Créer mon compte')}
          </CSButton>

          <p style={{ fontSize: 10.5, color: cs.faint, textAlign: 'center',

              style={{ color: cs.accent }}>crocscore.help@gmail.com</a>
          </p>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, type = 'text', trailing }) {

}

function Check({ checked, onToggle, children }) {
